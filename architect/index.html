<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="editor">
    <div id="editor-panel">
      <button class="add-btn" id="add-shape-btn">+</button>
      <div class="subpanels" id="subpanels"></div>
    </div>
    <textarea></textarea>
  </div>
  <div id="shape-popup"></div>
  <div id="canvas-container">
    <div id="floor-toggle" class="toggle on" title="Toggle floor">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
        <path d="M2 18 L12 22 L22 18 L12 14 Z" />
        <path d="M7 16 L17 20" />
        <path d="M17 16 L7 20" />
        <path d="M12 14 L12 22" />
      </svg>
      <div class="switch"><div class="knob"></div></div>
    </div>
    <div id="wireframe-toggle" class="toggle" title="Toggle wireframe">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
        <path d="M12 2 L22 8 L22 16 L12 22 L2 16 L2 8 Z" />
        <path d="M12 2 L12 22" />
        <path d="M2 8 L22 8" />
        <path d="M2 16 L22 16" />
        <path d="M2 8 L12 14 L22 8" />
        <path d="M2 16 L12 14 L22 16" />
      </svg>
      <div class="switch"><div class="knob"></div></div>
    </div>
  </div>
  <script type="module" src="src/sketch.ts"></script>
</body>
</html>
